name: Bug Report
description: Something is broken — help us fix it.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in every section so we can reproduce and fix it quickly.

  - type: input
    id: frappe_version
    attributes:
      label: Frappe / mYojana version
      description: Run `bench version` and paste the output.
      placeholder: "e.g. Frappe v15.x.x  |  mYojana v1.x.x"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: |
        Paste error traces from `bench/logs/frappe.log` or the browser console.
        Screenshots are welcome for UI bugs.
      render: text

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (data loss / security)
        - High (feature broken, no workaround)
        - Medium (feature degraded, workaround exists)
        - Low (cosmetic / minor)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing open issues and this is not a duplicate.
          required: true
        - label: I am running the latest `development` branch.
          required: false
